<h1>献立アプリのプロトタイピング</h1>
<div>近年外食をする人が増えている。その原因として私たちは独身の人の増加と料理の煩雑さが挙げられると考える</div><br>
<div>そこで私たちは料理のめんどくさいところを代わりにやってくれる献立アプリを開発することにした</div>
<h2>アプリの特徴</h2>
<ul>
    <li>簡単な操作で献立が作成できる</li>
    <li>栄養バランスを考慮した献立提案</li>
    <li>食材の在庫管理機能</li>
</ul>
<div>この献立アプリを使うことで、ユーザーは無駄な支出を減らうとともに、</div><br>
<div>健康的な食生活を送ることができるようになるというメリットがある。</div>
